[versions]
shadow = "8.3.9"
kotlin = "2.3.10"
kotlinx = "1.9.0"
picocli = "4.7.7"
extenre-patcher = "20.0.2.dev-RE"
extenre-library = "1.0.1"
gson = "2.13.2"

[libraries]
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx" }
picocli = { module = "info.picocli:picocli", version.ref = "picocli" }
extenre-patcher = { module = "com.extenre:extenre-patcher", version.ref = "extenre-patcher" }
extenre-library = { module = "com.extenre:extenre-library-jvm", version.ref = "extenre-library" }

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
kotlin = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
